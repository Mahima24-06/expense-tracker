<!-- Quick Stats Footer -->
<div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
  <h3 class="text-lg font-bold text-gray-800 mb-4">Quick Stats</h3>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div
      class="text-center p-4 bg-gradient-to-br from-blue-50 to-indigo-50 rounded-xl"
    >
      <p class="text-3xl font-bold text-indigo-600">{{ transaction_count }}</p>
      <p class="text-sm text-gray-600">Total Transactions</p>
    </div>
    <div
      class="text-center p-4 bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl"
    >
      <p class="text-3xl font-bold text-green-600">
        ₹{{ monthly_income|floatformat:0 }}
      </p>
      <p class="text-sm text-gray-600">This Month Income</p>
    </div>
    <div
      class="text-center p-4 bg-gradient-to-br from-red-50 to-pink-50 rounded-xl"
    >
      <p class="text-3xl font-bold text-red-600">
        ₹{{ monthly_expense|floatformat:0 }}
      </p>
      <p class="text-sm text-gray-600">This Month Expenses</p>
    </div>
    <div
      class="text-center p-4 bg-gradient-to-br from-purple-50 to-violet-50 rounded-xl"
    >
      <p class="text-3xl font-bold text-purple-600">{{ goal_count }}</p>
      <p class="text-sm text-gray-600">Active Goals</p>
    </div>
  </div>
</div>
