<!-- Chart.js Scripts -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Data from Django
    const dateLabels = {{ date_labels|safe }};
    const incomeData = {{ income_data|safe }};
    const expenseData = {{ expense_data|safe }};
    const categoryLabels = {{ category_labels|safe }};
    const categoryData = {{ category_data|safe }};

    // Color palette for pie chart
    const pieColors = [
      '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899',
      '#f43f5e', '#f97316', '#eab308', '#84cc16', '#22c55e',
      '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1'
    ];

    // Bar Chart
    const barCtx = document.getElementById('barChart').getContext('2d');
    new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: dateLabels,
        datasets: [
          {
            label: 'Income',
            data: incomeData,
            backgroundColor: 'rgba(34, 197, 94, 0.8)',
            borderColor: 'rgb(34, 197, 94)',
            borderWidth: 1,
            borderRadius: 4,
          },
          {
            label: 'Expenses',
            data: expenseData,
            backgroundColor: 'rgba(239, 68, 68, 0.8)',
            borderColor: 'rgb(239, 68, 68)',
            borderWidth: 1,
            borderRadius: 4,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          },
          tooltip: {
            backgroundColor: 'rgba(0,0,0,0.8)',
            titleColor: '#fff',
            bodyColor: '#fff',
            padding: 12,
            cornerRadius: 8,
            callbacks: {
              label: function(context) {
                return context.dataset.label + ': ₹' + context.raw.toLocaleString();
              }
            }
          }
        },
        scales: {
          x: {
            grid: {
              display: false
            },
            ticks: {
              maxRotation: 45,
              minRotation: 45,
              font: { size: 10 }
            }
          },
          y: {
            beginAtZero: true,
            grid: {
              color: 'rgba(0,0,0,0.05)'
            },
            ticks: {
              callback: function(value) {
                return '₹' + value.toLocaleString();
              }
            }
          }
        }
      }
    });

    // Pie Chart
    const pieCtx = document.getElementById('pieChart').getContext('2d');

    if (categoryLabels.length > 0) {
      new Chart(pieCtx, {
        type: 'doughnut',
        data: {
          labels: categoryLabels,
          datasets: [{
            data: categoryData,
            backgroundColor: pieColors.slice(0, categoryLabels.length),
            borderWidth: 0,
            hoverOffset: 10
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(0,0,0,0.8)',
              titleColor: '#fff',
              bodyColor: '#fff',
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: function(context) {
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const percentage = ((context.raw / total) * 100).toFixed(1);
                  return context.label + ': ₹' + context.raw.toLocaleString() + ' (' + percentage + '%)';
                }
              }
            }
          }
        }
      });

      // Update center text with total spent
      const total = categoryData.reduce((a, b) => a + b, 0);
      document.getElementById('pieChartCenter').textContent = '₹' + total.toLocaleString();

      // Build custom legend
      const legendContainer = document.getElementById('categoryLegend');

      categoryLabels.forEach((label, index) => {
        const percentage = ((categoryData[index] / total) * 100).toFixed(1);
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between p-2 bg-gray-50 rounded-lg';
        div.innerHTML = `
          <div class="flex items-center">
            <span class="w-3 h-3 rounded-full mr-2" style="background-color: ${pieColors[index]}"></span>
            <span class="text-sm text-gray-700">${label}</span>
          </div>
          <span class="text-sm font-medium text-gray-800">₹${categoryData[index].toLocaleString()}</span>
        `;
        legendContainer.appendChild(div);
      });
    } else {
      // No data message - hide center text
      const centerText = document.getElementById('pieChartCenter');
      if (centerText) centerText.parentElement.style.display = 'none';
      
      document.getElementById('pieChart').parentElement.querySelector('canvas').outerHTML = `
        <div class="flex items-center justify-center h-64 text-gray-500">
          <div class="text-center">
            <svg class="w-12 h-12 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path>
            </svg>
            <p>No expense data yet</p>
          </div>
        </div>
      `;
      document.getElementById('categoryLegend').innerHTML = '<p class="text-sm text-gray-500 text-center">Add expenses to see category breakdown</p>';
    }
  });
</script>
