<!-- Budget Progress Card -->
{% if current_budget %}
<div
  class="bg-gradient-to-br from-purple-500 to-indigo-600 rounded-2xl shadow-lg p-6 text-white"
>
  <h3 class="text-lg font-bold mb-4 flex items-center">
    <svg
      class="w-5 h-5 mr-2"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
      ></path>
    </svg>
    Budget This Month
  </h3>
  <div class="text-center mb-4">
    <div class="relative inline-flex items-center justify-center">
      <svg class="w-32 h-32 transform -rotate-90">
        <circle
          cx="64"
          cy="64"
          r="56"
          fill="none"
          stroke="rgba(255,255,255,0.2)"
          stroke-width="12"
        />
        <circle
          cx="64"
          cy="64"
          r="56"
          fill="none"
          stroke="white"
          stroke-width="12"
          stroke-dasharray="351.86"
          stroke-linecap="round"
        />
      </svg>
      <span class="absolute text-2xl font-bold"
        >{{ budget_used_percentage|floatformat:0 }}%</span
      >
    </div>
  </div>
  <div class="grid grid-cols-2 gap-4 text-sm">
    <div class="bg-white/10 rounded-lg p-3">
      <p class="text-purple-200">Spent</p>
      <p class="font-bold">₹{{ budget_used|floatformat:0 }}</p>
    </div>
    <div class="bg-white/10 rounded-lg p-3">
      <p class="text-purple-200">Remaining</p>
      <p class="font-bold">₹{{ budget_remaining|floatformat:0 }}</p>
    </div>
  </div>
  <a
    href="{% url 'budget_edit' %}"
    class="mt-4 block text-center text-sm text-purple-200 hover:text-white transition"
    >Edit Budget →</a
  >
</div>
{% else %}
<div
  class="bg-white rounded-2xl shadow-lg p-6 border-2 border-dashed border-gray-200"
>
  <div class="text-center">
    <div
      class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4"
    >
      <svg
        class="w-8 h-8 text-purple-600"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 6v6m0 0v6m0-6h6m-6 0H6"
        ></path>
      </svg>
    </div>
    <h3 class="font-bold text-gray-800 mb-2">Set Your Budget</h3>
    <p class="text-sm text-gray-500 mb-4">
      Track your monthly spending with a budget
    </p>
    <a
      href="{% url 'budget_add' %}"
      class="inline-block px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-medium hover:bg-purple-700 transition"
    >
      Create Budget
    </a>
  </div>
</div>
{% endif %}
